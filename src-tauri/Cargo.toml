[package]
name = "claude-tauri-gui"
version = "0.1.0"
description = "Claude Code Desktop GUI (Tauri)"
authors = ["orczh"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["unstable"] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
portable-pty = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "parking_lot", "rt-multi-thread"] }
reqwest = { version = "0.11", features = ["json"] }
anyhow = "1"
dirs = "5"
log = "0.4"
uuid = { version = "1", features = ["v4"] }
parking_lot = "0.12"
arc-swap = "1"
chrono = "0.4"
once_cell = "1"

[profile.release]
strip = true
lto = true
