# 本工作流用于：构建跨平台应用 -> 在 GitHub 发布 -> 自动同步到 Gitee（含 Release 和附件）
name: Release

on:
  push:
    tags:
      - 'v*'          # 推送 v 开头的标签时触发（例如 v1.0.0）
  workflow_dispatch:  # 允许在 GitHub 页面上手动触发

permissions:
  contents: write    # 赋予写入 Release 的权限

jobs:
  # ==========================================================
  # 任务一：跨平台构建 (Build)
  # 作用：在 Windows, macOS, Linux 上分别编译打包你的应用
  # ==========================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            name: 'macos'
            patterns: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: 'ubuntu-22.04'
            target: ''
            name: 'linux'
            patterns: |
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: 'windows-2022'
            target: ''
            name: 'windows'
            patterns: |
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup MSVC developer command prompt (windows only)
        if: matrix.platform == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure Rust linker via RUSTFLAGS (windows only)
        if: matrix.platform == 'windows-2022'
        shell: bash
        run: |
          # Get the link.exe path from PATH
          LINK_PATH=$(where link | head -1 | tr -d '\r\n')
          if [ -n "$LINK_PATH" ]; then
            echo "Found link.exe at: $LINK_PATH"
            # Create cargo config
            mkdir -p .cargo
            printf '[target.x86_64-pc-windows-msvc]\nlinker = "%s"\n' "$LINK_PATH" > .cargo/config.toml
            cat .cargo/config.toml
          else
            echo "ERROR: link.exe not found in PATH"
            exit 1
          fi

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build application
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --target ${{ matrix.target }}
          else
            npm run tauri build
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-box-${{ matrix.name }}
          path: ${{ matrix.patterns }}
          if-no-files-found: error

  # ==========================================================
  # 任务二：在 GitHub 发布 (Create GitHub Release)
  # 作用：将各平台构建好的产物收集起来，在 GitHub 上创建 Draft Release
  # ==========================================================
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true               # 创建为草稿，你可以检查一下再正式发布
          generate_release_notes: true # 自动生成更新日志
          files: |
            artifacts/cc-box-windows/**/*.exe
            artifacts/cc-box-macos/**/*.dmg
            artifacts/cc-box-linux/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

